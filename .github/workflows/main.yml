name: Run PTT Scraper

# 1. 設定觸發時間
on:
  schedule:
    # 台灣時間每天早上 8 點執行 (UTC 00:00)
    - cron: '19 0 * * *'
  workflow_dispatch: # 保留手動執行按鈕
  push:
    branches: [master]
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/main.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    # 給予寫入權限，這對 git push 至關重要
    permissions:
      contents: write

    steps:
    # 2. 檢出程式碼
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    # 3. 安裝 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    # 4. 安裝爬蟲需要的套件
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # 5. 執行爬蟲腳本
    - name: Run scraper
      run: python scraper.py

    # 6. 將更新後的 ptt_game.json 存回 GitHub
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        # 用 fetch+rebase 取代 pull，避免分歧時產生 merge commit
        git fetch origin master
        git rebase origin/master || git rebase --abort

        git add ptt_game.json

        # 明確判斷是否有變更，比 `commit || echo` 更可靠
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto update PTT data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin master
        fi
